name = "banana-icon"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "banana-icon-db"
database_id = "YOUR_D1_DATABASE_ID" # Replace after `wrangler d1 create banana-icon-db`

# R2 Bucket binding
[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "banana-icon-assets" # Replace after `wrangler r2 bucket create banana-icon-assets`

[vars]
NANO_BANANA_API_URL = "https://api.nano-banana.example.com"

# Secrets (set via `wrangler secret put`):
# - NANO_BANANA_API_KEY
